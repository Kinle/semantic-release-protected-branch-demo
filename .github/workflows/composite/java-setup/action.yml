name: Setup Java
description: Setup Java
inputs:
  java-version:
    description: Java version to use
    required: false
    default: "21"
runs:
  using: composite
  steps:
    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'corretto'
        java-version: ${{ inputs.java-version }}
        cache: gradle

